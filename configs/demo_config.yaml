# Demo Configuration
demo:
  # Model paths
  models:
    davis_model: "models/davis_model.pth"
    kiba_model: "models/kiba_model.pth"
    combined_model: "models/combined_model.pth"
    default_model: "combined_model"
  
  # Demo data
  demo_data:
    example_drugs: "data/demo/example_drugs.csv"
    example_proteins: "data/demo/example_proteins.csv"
    validation_pairs: "data/demo/validation_pairs.json"
  
  # Prediction settings
  prediction:
    batch_size: 32
    uncertainty_estimation: true
    attention_visualization: true
    explanation_generation: true
  
  # Frontend settings
  frontend:
    title: "DeepDTA-Pro: Drug-Target Affinity Prediction"
    theme: "light"
    sidebar_width: 300
    
    # Performance display
    show_metrics: true
    show_benchmarks: true
    show_dataset_stats: true
    
    # Visualization options
    molecular_viewer: "py3dmol"  # py3dmol, rdkit
    plot_backend: "plotly"       # plotly, matplotlib
    
    # Download options
    enable_downloads: true
    report_format: "pdf"  # pdf, html
    
  # Examples for quick testing
  examples:
    molecules:
      - name: "Imatinib"
        smiles: "CC1=C(C=C(C=C1)NC(=O)C2=CC=C(C=C2)CN3CCN(CC3)C)NC4=NC=CC(=N4)C5=CN=CC=C5"
        description: "BCR-ABL tyrosine kinase inhibitor"
      
      - name: "Aspirin"
        smiles: "CC(=O)OC1=CC=CC=C1C(=O)O"
        description: "Cyclooxygenase inhibitor"
      
      - name: "Caffeine"
        smiles: "CN1C=NC2=C1C(=O)N(C(=O)N2C)C"
        description: "Adenosine receptor antagonist"
    
    proteins:
      - name: "ABL1 kinase domain"
        sequence: ""
        description: "Abelson tyrosine kinase 1"
      
      - name: "EGFR kinase domain"
        sequence: ""
        description: "Epidermal growth factor receptor"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/demo.log"