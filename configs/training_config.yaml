# Training Configuration
training:
  # Basic training parameters
  batch_size: 64
  num_epochs: 200
  learning_rate: 1e-3
  weight_decay: 1e-4
  
  # Optimizer settings
  optimizer: "adam"  # adam, adamw, sgd
  scheduler: "cosine"  # cosine, step, exponential, reduce_on_plateau
  warmup_epochs: 10
  
  # Early stopping
  early_stopping:
    patience: 20
    min_delta: 1e-4
    monitor: "val_loss"
    mode: "min"
  
  # Validation
  validation_split: 0.15
  validation_frequency: 1  # epochs
  
  # Cross-dataset training
  cross_dataset:
    enabled: true
    alternation_frequency: 5  # epochs
    davis_weight: 1.0
    kiba_weight: 1.0
  
  # Checkpointing
  checkpoint:
    save_best: true
    save_last: true
    save_frequency: 10  # epochs
    monitor: "val_pearson"
    mode: "max"

# Data loading
data_loader:
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

# Mixed precision training
mixed_precision:
  enabled: true
  loss_scale: "dynamic"

# Distributed training
distributed:
  enabled: false
  backend: "nccl"